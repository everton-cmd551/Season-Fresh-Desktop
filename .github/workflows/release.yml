name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Inject Token
        shell: pwsh
        run: |
          (Get-Content main.js) -replace '%%GH_TOKEN_PLACEHOLDER%%', "${{ secrets.UPDATER_PAT }}" | Set-Content main.js

      - name: Build & Publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          UPDATER_PAT: ${{ secrets.UPDATER_PAT }}
        run: npm run release
